<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emm 🌼</title>
    <style>
        /* Estilos Base */
        body {
            background-color: #000;
            margin: 0;
            min-height: 200vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- 1. CASILLA DE FECHA (Fija) --- */
        #date-box {
            position: fixed; 
            left: 15px;
            top: 15px;
            border: 1px solid #00FF41;
            padding: 8px;
            background: rgba(0, 0, 0, 0.8);
            text-align: left;
            font-size: 0.75rem;
            z-index: 100;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.2);
        }
        .date-label { color: #00FF41; font-weight: bold; display: block; }
        .date-today { color: #FFFF00; font-weight: bold; display: block; margin: 2px 0; }
        #live-timer { color: #fff; font-variant-numeric: tabular-nums; }

        /* --- 2. SECCIÓN SUPERIOR --- */
        .section-top {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        /* CONTENEDOR DE FLORES ADAPTABLE */
        .flower-cluster {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px; /* Espacio entre flores en desktop */
            margin-bottom: 50px;
            flex-wrap: wrap; /* Permite que bajen si no caben */
            max-width: 600px;
        }

        .flower-item {
            position: relative;
            width: 20px;
            height: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Estilo base de los pétalos pixel */
        .pixel-flower-side, .pixel-daisy {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #FFD700; 
            box-shadow: 
                10px 0 #FFD700, 0 10px #FFD700, 10px 10px #FFD700, -10px 10px #FFD700, 10px -10px #FFD700,
                0 -20px var(--c), 0 -30px var(--c), 10px -20px var(--c), -10px -20px var(--c),
                0 30px var(--c), 0 40px var(--c), 10px 30px var(--c), -10px 30px var(--c),
                30px 0 var(--c), 40px 0 var(--c), 30px 10px var(--c), 30px -10px var(--c),
                -30px 0 var(--c), -40px 0 var(--c), -30px 10px var(--c), -30px -10px var(--c),
                20px 20px var(--c), 20px -20px var(--c), -20px 20px var(--c), -20px -20px var(--c),
                0 50px #4CAF50, 0 60px #4CAF50;
            animation: pulse-side 2s infinite alternate, float 4s ease-in-out infinite;
        }

        .pixel-daisy { --c: #FFFF00; } /* La central siempre amarilla */

        /* --- 3. MENSAJE Y BOTÓN --- */
        #content-container {
            text-align: center;
            z-index: 10;
            width: 100%;
            max-width: 500px;
        }
        .message {
            font-size: 1rem;
            line-height: 1.6;
            color: #00FF41; 
            text-shadow: 0 0 8px rgba(0, 255, 65, 0.4);
            margin-bottom: 30px;
            padding: 0 10px;
        }
        #love-button {
            background-color: #e74c3c;
            color: #fff;
            border: none;
            padding: 15px 25px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 0 5px 0 #b03a2e;
            transition: transform 0.1s;
        }
        #love-button:active { transform: translateY(3px); box-shadow: 0 2px 0 #b03a2e; }

        /* --- MESA Y JARRÓN --- */
        .section-bottom {
            width: 100%;
            padding-top: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .mesa-area { position: relative; margin-bottom: 100px; display: flex; flex-direction: column; align-items: center; }
        .mesa-linea { width: 280px; height: 3px; background: #00FF41; box-shadow: 0 0 10px #00FF41; }
        .jarron { width: 35px; height: 50px; border: 2px solid #00FF41; background: rgba(0,255,65,0.1); border-radius: 5px 5px 0 0; }

        /* --- ANIMACIONES --- */
        @keyframes pulse-side {
            from { filter: drop-shadow(0 0 5px var(--c)) brightness(1); }
            to { filter: drop-shadow(0 0 15px var(--c)) brightness(1.3); }
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        .heart, .heart-scroll { position: fixed; pointer-events: none; z-index: 200; font-size: 1.5rem; }
        @keyframes fly { to { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; } }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); opacity: 0; } }

        /* --- AJUSTES MÓVIL (PANTALLAS PEQUEÑAS) --- */
        @media (max-width: 600px) {
            .flower-cluster {
                display: grid;
                grid-template-columns: repeat(2, 1fr); /* 2 columnas */
                gap: 70px 40px; /* Más espacio vertical para que no se choquen los tallos */
                padding: 40px 0;
            }
            /* Hacemos que la margarita principal (la 3ra en el orden) ocupe el centro o sea la primera */
            .item-central { order: -1; grid-column: span 2; margin-bottom: 20px; }
            
            .message { font-size: 0.85rem; }
            #date-box { font-size: 0.6rem; left: 10px; top: 10px; }
        }
    </style>
</head>
<body>

    <div id="date-box">
        <span class="date-label">¿CUANDO TE AMO?</span>
        <span class="date-today">JUSTO AHORA: <span id="current-date"></span></span>
        <div id="live-timer">00:00:00:000</div>
    </div>

    <div class="section-top">
        <div class="flower-cluster" id="neon-cluster">
            <div class="flower-item"><div class="pixel-flower-side" style="--clr-1: #ff00ff; --c: var(--clr-1);"></div></div>
            <div class="flower-item"><div class="pixel-flower-side" style="--clr-2: #00ffff; --c: var(--clr-2);"></div></div>
            
            <div class="flower-item item-central"><div class="pixel-daisy"></div></div>

            <div class="flower-item"><div class="pixel-flower-side" style="--clr-3: #ff8000; --c: var(--clr-3);"></div></div>
            <div class="flower-item"><div class="pixel-flower-side" style="--clr-4: #80ff00; --c: var(--clr-4);"></div></div>
        </div>

        <div id="content-container">
            <p class="message">
                &gt; TE AMO CORAZONA DE MELON<br>
                &gt; Nunca te van a faltar flores conmigo<br>
                &gt; TE AMO del 1 al 2 mi Emmita_
            </p>
            <button id="love-button">pulsa para saber cuanto te amo</button>
        </div>
    </div>

    <div class="section-bottom">
        <div class="mesa-area">
            <div id="ramo-container" style="position:absolute; bottom:50px; width:100px; height:80px; display:flex; justify-content:center; opacity:0; transition:opacity 1s;">
                <div id="slot1" style="position:absolute; bottom:0; left:5px; transform:rotate(-15deg);"></div>
                <div id="slot2" style="position:absolute; bottom:0; left:40px;"></div>
                <div id="slot3" style="position:absolute; bottom:0; left:75px; transform:rotate(15deg);"></div>
            </div>
            <div class="jarron"></div>
            <div class="mesa-linea"></div>
        </div>
    </div>

    <script>
        // Colores Diarios
        function actualizarColores() {
            const hoy = new Date();
            const seed = hoy.getFullYear() + hoy.getMonth() + hoy.getDate();
            const cluster = document.getElementById('neon-cluster');
            for(let i=1; i<=4; i++) {
                const hue = (seed * (i * 137)) % 360;
                cluster.style.setProperty(`--clr-${i}`, `hsl(${hue}, 100%, 50%)`);
            }
        }
        actualizarColores();

        // Reloj
        function clock() {
            const now = new Date();
            document.getElementById('current-date').innerText = now.toLocaleDateString('es-ES');
            document.getElementById('live-timer').innerText = now.getHours().toString().padStart(2,'0') + ":" + 
                now.getMinutes().toString().padStart(2,'0') + ":" + 
                now.getSeconds().toString().padStart(2,'0') + ":" + 
                now.getMilliseconds().toString().padStart(3,'0');
            requestAnimationFrame(clock);
        }
        clock();

        // Ramo semanal
        const flowers = [
            { c: '#ff0000', m: '#800000' }, { c: '#FFD700', m: '#5d3a1a' },
            { c: '#ff69b4', m: '#ff1493' }, { c: '#ffffff', m: '#FFD700' }
        ];
        function drawF(id, f) {
            document.getElementById(id).innerHTML = `<div style="width:14px; height:14px; background:${f.m}; box-shadow: 0 -7px ${f.c}, 0 7px ${f.c}, 7px 0 ${f.c}, -7px 0 ${f.c};"></div><div style="width:2px; height:50px; background:#4CAF50; margin:0 auto;"></div>`;
        }
        const config = [[0,0,0], [1,0,1], [2,2,2], [3,1,3], [0,2,0], [1,1,1], [3,0,2]][new Date().getDay()];
        drawF('slot1', flowers[config[0]]); drawF('slot2', flowers[config[1]]); drawF('slot3', flowers[config[2]]);

        // Corazones
        const btn = document.getElementById('love-button');
        btn.onclick = () => {
            document.getElementById('ramo-container').style.opacity = "1";
            for(let i=0; i<10; i++){
                const h = document.createElement('div');
                h.className = 'heart'; h.innerHTML = '❤️';
                h.style.left = '50%'; h.style.top = '50%';
                h.style.setProperty('--x', (Math.random()*400-200)+'px');
                h.style.setProperty('--y', -(Math.random()*400+100)+'px');
                h.style.animation = `fly ${Math.random()+1}s forwards`;
                document.body.appendChild(h);
                setTimeout(()=>h.remove(), 2000);
            }
        };

        window.onscroll = () => {
            if(Math.random()>0.9) {
                const h = document.createElement('div');
                h.className = 'heart-scroll'; h.innerHTML = '💛';
                h.style.left = Math.random()*100+'vw'; h.style.top = '-20px';
                h.style.animation = `fall ${Math.random()*3+2}s linear forwards`;
                document.body.appendChild(h);
                setTimeout(()=>h.remove(), 5000);
            }
        };
    </script>
</body>
</html>
