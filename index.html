<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emm 🌼 </title>
    <style>
        /* Estilos Base Techno - ORIGINALES E INTACTOS */
        body {
            background-color: #000;
            margin: 0;
            min-height: 220vh; /* Permite el scroll hacia la mesa */
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            position: relative;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- 1. CASILLA DE FECHA (IZQUIERDA) --- ORIGINAL */
        #date-box {
            position: fixed; 
            left: 20px;
            top: 20px;
            border: 1px solid #00FF41;
            padding: 10px;
            background: rgba(0, 255, 65, 0.05);
            text-align: left;
            font-size: 0.8rem;
            z-index: 15;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.2);
        }
        .date-label { color: #00FF41; font-weight: bold; display: block; margin-bottom: 2px; }
        .date-today { color: #FFFF00; font-weight: bold; display: block; margin-bottom: 5px; }
        #live-timer { color: #fff; font-variant-numeric: tabular-nums; letter-spacing: 1px; }

        /* --- 2. LA MARGARITA PIXELADA --- ORIGINAL */
        .section-top {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .pixel-daisy {
            position: relative;
            width: 10px;
            height: 10px;
            background: #FFD700; 
            box-shadow: 
                10px 0 #FFD700, 0 10px #FFD700, 10px 10px #FFD700, -10px 10px #FFD700, 10px -10px #FFD700,
                0 -20px #FFFF00, 0 -30px #FFFF00, 10px -20px #FFFF00, -10px -20px #FFFF00,
                0 30px #FFFF00, 0 40px #FFFF00, 10px 30px #FFFF00, -10px 30px #FFFF00,
                30px 0 #FFFF00, 40px 0 #FFFF00, 30px 10px #FFFF00, 30px -10px #FFFF00,
                -30px 0 #FFFF00, -40px 0 #FFFF00, -30px 10px #FFFF00, -30px -10px #FFFF00,
                20px 20px #FFFF00, 20px -20px #FFFF00, -20px 20px #FFFF00, -20px -20px #FFFF00,
                0 50px #4CAF50, 0 60px #4CAF50, 0 70px #4CAF50, 0 80px #4CAF50;
            animation: pulse 2s infinite alternate, float 4s ease-in-out infinite;
        }

        @keyframes pulse {
            from { filter: drop-shadow(0 0 5px #FFFF00) brightness(1); }
            to { filter: drop-shadow(0 0 20px #FFFF00) brightness(1.3); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        /* --- 3. MENSAJE Y BOTÓN ROJO --- ORIGINAL */
        #content-container {
            margin-top: 110px;
            text-align: center;
            max-width: 85%;
            z-index: 5;
            opacity: 0;
            animation: fadeIn 3s ease-out forwards 1s;
        }
        .message {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #00FF41; 
            text-shadow: 0 0 8px rgba(0, 255, 65, 0.6);
            margin-bottom: 35px;
        }
        #love-button {
            background-color: #e74c3c;
            color: #fff;
            border: none;
            padding: 14px 28px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 0 5px 0 #b03a2e;
            transition: all 0.1s;
        }
        #love-button:active { transform: translateY(3px); box-shadow: 0 2px 0 #b03a2e; }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 100;
        }
        .heart {
            position: fixed;
            font-size: 1.8rem;
            pointer-events: none;
            z-index: 101;
            animation: fly linear forwards;
        }
        @keyframes fly {
            to { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }
        @keyframes fadeIn { to { opacity: 1; } }

        /* --- NUEVA ÁREA: MESA Y JARRÓN (CON MUCHO ESPACIO) --- */
        .section-bottom {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            padding-top: 400px; /* AQUÍ ESTÁ EL ESPACIO EXTRA ENTRE BOTÓN Y MESA */
        }

        .mesa-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            margin-bottom: 200px; /* ESPACIO AL FINAL PARA PERSPECTIVA */
        }

        .mesa-linea {
            width: 320px;
            height: 4px;
            background: #00FF41;
            box-shadow: 0 0 15px #00FF41;
        }

        .jarron {
            width: 40px;
            height: 55px;
            border: 2px solid #00FF41;
            border-bottom: none;
            background: rgba(0, 255, 65, 0.1);
            border-radius: 8px 8px 0 0;
            position: relative;
        }

        /* Contenedor del Ramo */
        #ramo-container {
            position: absolute;
            bottom: 55px;
            width: 100px;
            height: 100px;
            display: flex;
            justify-content: center;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        .flor-ramo { position: absolute; bottom: 0; }
        .f1 { left: 5px; transform: rotate(-15deg); }
        .f2 { left: 40px; bottom: 10px; }
        .f3 { left: 75px; transform: rotate(15deg); }
        .tallo { width: 2px; height: 60px; background: #4CAF50; margin: 0 auto; }

        /* --- ANIMACIONES DE LOS NUEVOS CORAZONES --- */
        .heart-scroll {
            position: fixed;
            font-size: 1.5rem;
            pointer-events: none;
            z-index: 99;
            animation: fall linear forwards;
        }
        @keyframes fall {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        .heart-brotar {
            position: absolute;
            font-size: 1.2rem;
            pointer-events: none;
            z-index: 10;
            bottom: 60px;
            animation: floatUp linear forwards;
        }
        @keyframes floatUp {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--bx), -300px) scale(1.5); opacity: 0; }
        }

        @media (max-width: 600px) {
            #date-box { font-size: 0.65rem; left: 10px; top: 10px; }
            .message { font-size: 0.95rem; }
            .section-bottom { padding-top: 300px; }
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div id="date-box">
        <span class="date-label">¿CUANTO TE AMO?</span>
        <span class="date-today">JUSTO AHORA: <span id="current-date"></span></span>
        <div id="live-timer">0
